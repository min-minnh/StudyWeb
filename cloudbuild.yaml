steps:
# ======================
# STEP 1: BUILD WAR FILE
# ======================
- name: 'eclipse-temurin:17'
  entrypoint: bash
  args:
    - -c
    - |
      apt update
      apt install -y ant
      ant -noinput -buildfile build.xml clean dist

# ======================
# STEP 2: COPY WAR TO VM
# ======================
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - compute
    - scp
    - dist/StudyWeb.war
    - ubuntu@instance-20260222-144634:~
    - --zone=asia-southeast1-a

# ======================
# STEP 3: DEPLOY & RESTART TOMCAT
# ======================
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - compute
    - ssh
    - ubuntu@instance-20260222-144634
    - --zone=asia-southeast1-a
    - --
    - |
      sudo systemctl stop tomcat10
      sudo rm -rf /var/lib/tomcat10/webapps/StudyWeb*
      sudo mv ~/StudyWeb.war /var/lib/tomcat10/webapps/
      sudo systemctl start tomcat10

options:
  logging: CLOUD_LOGGING_ONLY